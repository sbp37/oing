name: Check restoreAccount reachability (manual, diagnostic)

# 일회성 진단용 — "계정 연결" 시 "서버 확인에 실패했어요" 보고를 받고, restoreAccount
# 콜러블 자체가 실제로 도달 가능한지 확인한다. 읽기 전용(action:'status'), 아무것도 안 씀.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run diagnostic
        run: node test/check-restore-account.mjs
