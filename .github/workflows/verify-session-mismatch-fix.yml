name: Verify session-mismatch fix (manual)

# 2026-07-13 인시던트(먹보/쑤 점수 미등록) 대응 확인용 — 실제 배포된 submitScore를
# 라이브로 호출해서 세션 불일치/유실 케이스가 더 이상 조용히 실패하지 않는지 검증한다.
# 비밀키 불필요 — 매 실행마다 익명 테스트 계정 2개를 새로 만들어서 씀.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run live verification
        run: node test/verify-session-mismatch-fix.mjs
