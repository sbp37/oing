<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오잉게임 · 계정 진단 (읽기 전용)</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0b0e17; color:#e8edf5;
    font-family:'Pretendard','Noto Sans KR','Malgun Gothic',sans-serif;
    line-height:1.7; padding:22px 16px 60px; max-width:560px; margin:0 auto;
    font-size:15px; -webkit-text-size-adjust:100%;
  }
  h1 { font-size:20px; color:#7ec2f0; margin-bottom:4px; }
  .sub { font-size:12.5px; color:#7a8ba3; margin-bottom:18px; }
  .card {
    background:#141a28; border:1px solid #223049; border-radius:12px;
    padding:14px 16px; margin-bottom:12px;
  }
  .label { font-size:12.5px; color:#8aa0bd; margin-bottom:3px; }
  .value { font-size:19px; font-weight:800; word-break:break-all; }
  .value.ok { color:#5fd38a; }
  .value.warn { color:#f2b45a; }
  .value.bad { color:#ff7a7a; }
  .value.muted { color:#7a8ba3; font-weight:600; font-size:16px; }
  .verdict {
    margin-top:16px; padding:14px 16px; border-radius:12px;
    font-size:15px; line-height:1.7; border:1px solid;
  }
  .verdict.case1 { background:rgba(95,211,138,0.08); border-color:rgba(95,211,138,0.35); }
  .verdict.case2 { background:rgba(255,122,122,0.08); border-color:rgba(255,122,122,0.35); }
  .verdict.caseX { background:rgba(242,180,90,0.08); border-color:rgba(242,180,90,0.35); }
  .verdict b { color:#fff; }
  .note { font-size:12px; color:#6b7c96; margin-top:18px; line-height:1.6; }
  .ro-badge {
    display:inline-block; font-size:11px; font-weight:800; color:#0b0e17;
    background:#5fd38a; border-radius:6px; padding:1px 8px; margin-left:6px; vertical-align:middle;
  }
</style>
</head>
<body>
  <h1>🩺 오잉게임 계정 진단 <span class="ro-badge">읽기 전용</span></h1>
  <div class="sub">이 폰 브라우저에 저장된 값만 화면에 보여줍니다. 아무것도 바꾸거나 지우지 않아요.</div>

  <div class="card">
    <div class="label">① 이 기기가 기억하는 닉네임 (oeing_nickname_v1)</div>
    <div class="value" id="vNick">—</div>
  </div>

  <div class="card">
    <div class="label">② 이 기기가 연결됐다고 믿는 UID (oeing_uid_linked_v1) · 일부 가림</div>
    <div class="value" id="vUid">—</div>
  </div>

  <div class="card">
    <div class="label">③ PIN 저장 여부 (원문은 표시하지 않음)</div>
    <div class="value" id="vPin">—</div>
  </div>

  <div class="verdict" id="verdict" style="display:none;"></div>

  <div class="note" id="note"></div>

<script>
// ── 읽기 전용 진단: localStorage.getItem 만 사용 ──
// setItem / removeItem / clear / fetch / Firebase 호출 전혀 없음.
(function () {
  var get = function (k) {
    try { return localStorage.getItem(k); } catch (e) { return null; }
  };

  var nick = get('oeing_nickname_v1');
  var uid  = get('oeing_uid_linked_v1');
  var pin  = get('oeing_pin_v1');

  // ① 닉네임 — 그대로 표시(본인이 화면에서 이미 보는 이름)
  var nickEl = document.getElementById('vNick');
  if (nick) { nickEl.textContent = nick; nickEl.className = 'value ' + (nick === '오잉' ? 'ok' : 'bad'); }
  else { nickEl.textContent = '(저장된 닉네임 없음)'; nickEl.className = 'value muted'; }

  // ② UID — 앞 6 + 뒤 4만, 가운데는 가림
  var uidEl = document.getElementById('vUid');
  if (uid) {
    var masked = uid.length > 12 ? (uid.slice(0, 6) + '••••••' + uid.slice(-4)) : uid;
    uidEl.textContent = masked;
    uidEl.className = 'value muted';
  } else {
    uidEl.textContent = '(UID 연결 기록 없음)';
    uidEl.className = 'value warn';
  }

  // ③ PIN — 존재 여부만
  var pinEl = document.getElementById('vPin');
  if (pin) { pinEl.textContent = 'PIN 저장됨 ✅'; pinEl.className = 'value ok'; }
  else { pinEl.textContent = 'PIN 없음'; pinEl.className = 'value warn'; }

  // ── 해석 안내 ──
  var v = document.getElementById('verdict');
  v.style.display = 'block';
  if (nick && nick !== '오잉') {
    if (uid) {
      v.className = 'verdict caseX';
      v.innerHTML = '이 기기는 자기를 <b>"' + nick + '"</b>(으)로 기억하고 있고, 어떤 UID에 연결돼 있어요.<br><br>'
        + '다음 한 가지만 알려주세요 → <b>이 UID 앞 6자리 / 뒤 4자리</b>가, 다른 기기에서 오잉으로 정상 접속될 때의 UID와 같은가요?<br>'
        + '• <b>같으면</b> → 계정(UID)은 오잉이 맞고, 이 폰의 <b>이름 값만 꼬인 것</b>(가벼운 케이스)<br>'
        + '• <b>다르면</b> → 이 폰이 <b>다른 계정에 연결</b>된 것(무겁게 다뤄야 함)';
    } else {
      v.className = 'verdict caseX';
      v.innerHTML = '이 기기에 <b>"' + nick + '"</b> 이름은 있는데 <b>UID 연결 기록이 없어요.</b><br>'
        + '아직 UID에 연결되지 않은(레거시/오프라인) 상태로 이 이름을 쓰는 중일 수 있어요.';
    }
  } else if (nick === '오잉') {
    v.className = 'verdict case1';
    v.innerHTML = '이 기기의 저장된 이름은 <b>"오잉"</b>으로 정상입니다.<br>'
      + '그런데도 화면에 "지니롱"이 보인다면 저장값 문제가 아니라 다른 원인일 수 있으니, 이 화면을 캡처해서 알려주세요.';
  } else {
    v.className = 'verdict case2';
    v.innerHTML = '이 기기에 저장된 닉네임이 없습니다. (아직 등록 안 됨 또는 이미 초기화됨)';
  }

  document.getElementById('note').innerHTML =
    '※ 이 페이지는 <b>읽기 전용</b>입니다 — 값을 지우거나 바꾸거나 서버에 아무것도 보내지 않습니다.<br>'
    + '진단이 끝나면 이 diag.html 파일은 삭제해도 됩니다.';
})();
</script>
</body>
</html>
